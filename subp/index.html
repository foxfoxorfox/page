<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>3D Cube</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container-fluid vh-100 d-flex justify-content-center align-items-center bg-dark">

    <div class="scene">
        <div class="cube" id="cube">

            <div class="face front">앞</div>
            <div class="face back">뒤</div>

            <div class="face right">오</div>
            <div class="face left">왼</div>

            <div class="face top">위</div>
            <div class="face bottom">아래</div>

        </div>
    </div>

</div>

<script src="index.js"></script>
</body>
</html>
