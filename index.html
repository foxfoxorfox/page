<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Physics Simulator</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body {
            margin: 0;
            overflow: hidden;
            background: #222;
        }

        canvas {
            display: block;
        }

        #controls {

            position: absolute;

            top: 0;
            left: 0;

            width: 100%;
            height: 80px;

            background: #333;

            color: white;

            display: flex;
            align-items: center;
            gap: 30px;

            padding: 0 20px;

            z-index: 10;

            border-bottom: 2px solid #555;
        }

        .control-group {

            display: flex;
            align-items: center;
            gap: 8px;
        }

        .value {

            width: 50px;
            text-align: center;
        }

    </style>

</head>

<body>

<div id="controls">

    <div class="control-group">

        <span>Gravity</span>

        <button id="gMinus" class="btn btn-sm btn-danger">-</button>

        <span id="gValue" class="value">0.5</span>

        <button id="gPlus" class="btn btn-sm btn-success">+</button>

    </div>

    <div class="control-group">

        <span>Mass</span>

        <button id="mMinus" class="btn btn-sm btn-danger">-</button>

        <span id="mValue" class="value">1.0</span>

        <button id="mPlus" class="btn btn-sm btn-success">+</button>

    </div>

    <div class="control-group">

        <span>Damping</span>

        <button id="dMinus" class="btn btn-sm btn-danger">-</button>

        <span id="dValue" class="value">0.99</span>

        <button id="dPlus" class="btn btn-sm btn-success">+</button>

    </div>

</div>

<canvas id="canvas"></canvas>

<script src="./index.js"></script>

</body>
</html>
